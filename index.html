<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR • Premium Virtual Piano</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');

        :root {
            --accent: #c9a66b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 30px 20px 40px;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            letter-spacing: -6px;
            background: linear-gradient(90deg, #f0f0f0, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 15px 30px rgba(0, 0, 0, 0.85);
        }

        .subtitle {
            font-size: 1.15rem;
            opacity: 0.75;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .piano-container {
            max-width: 1380px;
            margin: 0 auto;
            perspective: 1400px;
        }

        .piano {
            display: flex;
            height: 380px;
            background: linear-gradient(180deg, #1c1c1c 0%, #111111 100%);
            border: 22px solid #161616;
            border-radius: 28px;
            box-shadow: 
                0 35px 60px -15px rgba(0, 0, 0, 0.95),
                inset 0 15px 30px rgba(255,255,255,0.06),
                0 0 120px rgba(201, 166, 107, 0.18);
            position: relative;
            overflow: hidden;
            padding: 18px 18px 0;
            transform: rotateX(8deg);
        }

        .key {
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            transition: all 0.12s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            border-radius: 0 0 16px 16px;
            box-shadow: 
                6px 18px 12px -6px rgba(0, 0, 0, 0.85),
                inset 0 18px 24px rgba(255,255,255,0.75),
                inset 0 -10px 18px rgba(0,0,0,0.6);
        }

        .white-key {
            flex: 1;
            min-width: 52px;
            max-width: 52px;
            height: 100%;
            background: linear-gradient(180deg, #f5f5f5 4%, #e8e8e8 98%);
            color: #111111;
            border: 4px solid #1f1f1f;
            border-top: none;
            z-index: 2;
        }

        .black-key {
            width: 36px;
            height: 228px;
            background: linear-gradient(180deg, #222222 4%, #0d0d0d 98%);
            color: #f0f0f0;
            border: 4px solid #000;
            margin-left: -18px;
            margin-top: -210px;
            z-index: 10;
            border-radius: 0 0 10px 10px;
        }

        .key-label {
            text-align: center;
            width: 100%;
            padding-bottom: 22px;
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .kb-label {
            font-size: 0.82rem;
            opacity: 0.65;
            margin-top: 6px;
        }

        .key:active, .key.pressed {
            transform: translateY(18px) rotateX(6deg);
            box-shadow: 3px 6px 8px -3px rgba(0, 0, 0, 0.7);
            filter: brightness(0.92);
        }

        .key:hover {
            filter: brightness(1.18);
            transform: translateY(-8px) rotateX(4deg);
        }

        .controls {
            max-width: 1380px;
            margin: 40px auto 0;
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #222222;
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px);
        }

        textarea {
            background: rgba(15, 15, 15, 0.95);
            border: 3px solid #2a2a2a;
            border-radius: 16px;
            color: #f0f0f0;
            font-family: monospace;
            font-size: 1.18rem;
            padding: 22px;
            resize: none;
            height: 130px;
            width: 100%;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 5px rgba(201, 166, 107, 0.25);
        }

        .btn-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn-3d {
            padding: 18px 36px;
            font-size: 1.15rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            background: linear-gradient(180deg, #222222 0%, #161616 100%);
            color: #f0f0f0;
            box-shadow: 0 14px 0 #1a1a1a, 0 18px 24px rgba(0,0,0,0.7);
            transition: all 0.25s ease;
        }

        .btn-3d:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 0 #1a1a1a, 0 24px 30px rgba(201, 166, 107, 0.35);
        }

        .btn-3d:active {
            transform: translateY(9px);
        }

        .btn-play {
            background: linear-gradient(180deg, var(--accent), #b38c4f);
            color: #111;
        }

        @media (max-width: 1100px) {
            .piano { height: 310px; }
            .white-key { min-width: 42px; max-width: 42px; }
            .black-key { width: 29px; height: 186px; margin-top: -172px; margin-left: -14.5px; }
        }

        @media (max-width: 640px) {
            .piano { width: max-content; margin: 0 auto; }
            .btn-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">NOIR</div>
        <div class="subtitle">PREMIUM VIRTUAL PIANO</div>
    </header>

    <div class="piano-container">
        <div id="piano" class="piano"></div>
    </div>

    <div class="controls">
        <h2 style="color: var(--accent); margin-bottom: 12px;">PASTE TUNE &amp; AUTOPLAY</h2>
        <textarea id="tune-input" placeholder="Example:\nC4 D4 E4 F4 G4 A4 B4 C5\n\nOr with sharps:\nC#4 D#4 F#4 G#4 A#4"></textarea>
        
        <div class="btn-row">
            <button id="play-btn" class="btn-3d btn-play">▶️ PLAY TUNE</button>
            <button id="stop-btn" class="btn-3d">⏹ STOP</button>
        </div>
    </div>

    <script>
        const pianoKeysData = [
            { note: "C4",  kb: "z", sharp: false, display: "C" },
            { note: "C#4", kb: "s", sharp: true,  display: "C#" },
            { note: "D4",  kb: "x", sharp: false, display: "D" },
            { note: "D#4", kb: "d", sharp: true,  display: "D#" },
            { note: "E4",  kb: "c", sharp: false, display: "E" },
            { note: "F4",  kb: "v", sharp: false, display: "F" },
            { note: "F#4", kb: "g", sharp: true,  display: "F#" },
            { note: "G4",  kb: "b", sharp: false, display: "G" },
            { note: "G#4", kb: "h", sharp: true,  display: "G#" },
            { note: "A4",  kb: "n", sharp: false, display: "A" },
            { note: "A#4", kb: "j", sharp: true,  display: "A#" },
            { note: "B4",  kb: "m", sharp: false, display: "B" },
            { note: "C5",  kb: "q", sharp: false, display: "C" },
            { note: "C#5", kb: "2", sharp: true,  display: "C#" },
            { note: "D5",  kb: "w", sharp: false, display: "D" },
            { note: "D#5", kb: "3", sharp: true,  display: "D#" },
            { note: "E5",  kb: "e", sharp: false, display: "E" },
            { note: "F5",  kb: "r", sharp: false, display: "F" },
            { note: "F#5", kb: "5", sharp: true,  display: "F#" },
            { note: "G5",  kb: "t", sharp: false, display: "G" },
            { note: "G#5", kb: "6", sharp: true,  display: "G#" },
            { note: "A5",  kb: "y", sharp: false, display: "A" },
            { note: "A#5", kb: "7", sharp: true,  display: "A#" },
            { note: "B5",  kb: "u", sharp: false, display: "B" },
            { note: "C6",  kb: "i", sharp: false, display: "C" }
        ];

        let audioContext;
        let reverbNode;
        let masterGain;
        let activeSources = [];
        let currentTimeouts = [];
        let isPlayingTune = false;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            masterGain = audioContext.createGain();
            masterGain.gain.value = 0.9;

            // Simple but effective reverb
            const reverbLength = audioContext.sampleRate * 2.2;
            const impulse = audioContext.createBuffer(2, reverbLength, audioContext.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = impulse.getChannelData(ch);
                for (let i = 0; i < reverbLength; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLength, 3);
                }
            }
            reverbNode = audioContext.createConvolver();
            reverbNode.buffer = impulse;

            reverbNode.connect(masterGain);
            masterGain.connect(audioContext.destination);
        }

        function noteToFrequency(note) {
            const notes = {C:0, "C#":1, Db:1, D:2, "D#":3, Eb:3, E:4, F:5, "F#":6, Gb:6, G:7, "G#":8, Ab:8, A:9, "A#":10, Bb:10, B:11};
            const match = note.match(/^([A-G][#b]?)([0-8])$/i);
            if (!match) return null;
            
            let name = match[1].replace('b','♭').toUpperCase();
            if (name === 'DB') name = 'C#';
            if (name === 'EB') name = 'D#';
            if (name === 'GB') name = 'F#';
            if (name === 'AB') name = 'G#';
            if (name === 'BB') name = 'A#';

            const octave = parseInt(match[2]);
            const semitone = notes[name];
            if (semitone === undefined) return null;

            const midi = (octave + 1) * 12 + semitone;
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        function playNote(noteName, duration = 480) {
            initAudio();
            const ctx = audioContext;
            const now = ctx.currentTime;
            const freq = noteToFrequency(noteName);
            if (!freq) return;

            const osc = ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now);

            const osc2 = ctx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(freq * 1.003, now);

            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3400, now);

            const envelope = ctx.createGain();
            envelope.gain.setValueAtTime(0, now);
            envelope.gain.linearRampToValueAtTime(0.95, now + 0.008);
            envelope.gain.linearRampToValueAtTime(0.35, now + 0.15);
            envelope.gain.exponentialRampToValueAtTime(0.001, now + duration/1000);

            osc.connect(filter);
            osc2.connect(filter);
            filter.connect(envelope);
            envelope.connect(reverbNode);
            envelope.connect(masterGain);

            osc.start(now);
            osc2.start(now);
            osc.stop(now + duration/1000 + 1);
            osc2.stop(now + duration/1000 + 1);

            activeSources.push(osc, osc2, envelope);
        }

        function pressKeyVisual(note) {
            const keys = document.querySelectorAll(`[data-note="${note}"]`);
            keys.forEach(key => {
                key.classList.add('pressed');
                setTimeout(() => key.classList.remove('pressed'), 180);
            });
        }

        function triggerNote(note) {
            playNote(note);
            pressKeyVisual(note);
        }

        function buildPiano() {
            const piano = document.getElementById('piano');
            piano.innerHTML = '';

            pianoKeysData.forEach(k => {
                const key = document.createElement('div');
                key.className = k.sharp ? 'key black-key' : 'key white-key';
                key.dataset.note = k.note;

                key.innerHTML = `
                    <div class="key-label">
                        ${k.display}<br>
                        <span style="font-size:0.8rem; opacity:0.7;">${k.kb.toUpperCase()}</span>
                    </div>
                `;

                key.addEventListener('mousedown', () => triggerNote(k.note));
                key.addEventListener('touchstart', (e) => { e.preventDefault(); triggerNote(k.note); });

                piano.appendChild(key);
            });
        }

        function setupKeyboard() {
            const map = {};
            pianoKeysData.forEach(k => map[k.kb] = k.note);

            document.addEventListener('keydown', e => {
                if (e.repeat) return;
                const note = map[e.key.toLowerCase()];
                if (note) triggerNote(note);
            });
        }

        // FIXED TUNE PARSING
        function parseTune(input) {
            if (!input) return [];
            
            return input
                .toUpperCase()
                .split(/[\s\n,]+/)           // split by space, newline, or comma
                .map(n => n.trim())
                .filter(n => /^[A-G][#B]?[0-8]$/i.test(n));  // improved regex
        }

        function stopCurrentTune() {
            activeSources.forEach(source => {
                if (source && typeof source.stop === 'function') {
                    try { source.stop(); } catch(e) {}
                }
                if (source && source.gain) {
                    source.gain.cancelScheduledValues(audioContext ? audioContext.currentTime : 0);
                }
            });
            activeSources = [];
            currentTimeouts.forEach(clearTimeout);
            currentTimeouts = [];
            isPlayingTune = false;
        }

        function playTuneSequence(notes) {
            stopCurrentTune();
            if (notes.length === 0) return;

            isPlayingTune = true;
            let delay = 0;
            const interval = 260;

            notes.forEach(note => {
                const timeout = setTimeout(() => {
                    if (isPlayingTune) triggerNote(note);
                }, delay);
                currentTimeouts.push(timeout);
                delay += interval;
            });
        }

        function setupTuneFeature() {
            const textarea = document.getElementById('tune-input');
            const playBtn = document.getElementById('play-btn');
            const stopBtn = document.getElementById('stop-btn');

            playBtn.addEventListener('click', () => {
                const notes = parseTune(textarea.value);
                if (notes.length > 0) {
                    playTuneSequence(notes);
                } else {
                    alert("Please enter valid notes like: C4 D4 E4 F4 G4");
                }
            });

            stopBtn.addEventListener('click', stopCurrentTune);

            // Press Enter to play
            textarea.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    playBtn.click();
                }
            });
        }

        // Initialize
        window.onload = () => {
            buildPiano();
            setupKeyboard();
            setupTuneFeature();
            console.log('%cNOIR Virtual Piano - Tune playback fixed ✅', 'color:#c9a66b; font-size:14px');
        };
    </script>
</body>
</html>
